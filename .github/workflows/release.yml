name: release

# Compila IonConnect en las máquinas de GitHub (que ya tienen todo
# preinstalado: MSVC en Windows, libwebkit2gtk en Ubuntu) y publica
# instaladores listos para descargar — así el usuario final no necesita
# Rust, Visual Studio ni ninguna dependencia de compilación.
#
# Para publicar una versión: `git tag v0.1.0 && git push origin v0.1.0`
# (o disparar manualmente desde la pestaña "Actions" de GitHub).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            core-artifact: ionconnect-core
          - platform: windows-latest
            core-artifact: ionconnect-core.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: instalar dependencias del sistema (solo Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libdbus-1-dev patchelf

      - name: instalar Rust estable
        uses: dtolnay/rust-toolchain@stable

      - name: cache de Rust
        uses: Swatinem/rust-cache@v2

      - name: compilar ionconnect-core
        run: cargo build --release -p ionconnect-core

      - name: publicar el instalador de la GUI (Tauri)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: 'IonConnect ${{ github.ref_name }}'
          releaseBody: |
            Instalación:
            - **Windows**: descargar y correr el `.msi` o `.exe`.
            - **Ubuntu**: descargar el `.deb` (`sudo apt install ./ionconnect_*.deb`) o el `.AppImage`.

            `ionconnect-core` (el servicio que comparte mouse/teclado/portapapeles)
            se descarga aparte de esta misma release y va en el `PATH`.
          releaseDraft: false
          prerelease: false

      - name: adjuntar ionconnect-core a la release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: target/release/${{ matrix.core-artifact }}
